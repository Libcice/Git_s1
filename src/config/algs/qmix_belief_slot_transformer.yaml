# --- QMIX + belief-slot transformer ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 2000
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner_belief_slot_transformer"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "belief_slot_transformer_mac"
agent: "belief_slot_transformer"

transformer_hidden_dim: 48
belief_update_heads: 4
belief_update_dropout: 0.0
belief_ff_mult: 4

belief_loss_coef: 0.001
belief_logvar_min: -2.0
belief_logvar_max: 1.0
belief_lowrank_rank: 3
belief_nll_clip: 2.0
belief_warmup_t: 500000

name: "qmix_belief_slot_transformer"
