# --- QMIX + history-token RNN belief ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 2000              # 从 5000 减少到 2000，减少显存占用
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner_history_token_rnn_belief"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "history_token_rnn_belief_mac"
agent: "history_token_rnn_belief"
rnn_hidden_dim: 48

history_steps: 3               # 从 4 减少到 3

belief_loss_coef: 0.001
belief_logvar_min: -2.0
belief_logvar_max: 1.0
belief_lowrank_rank: 3         # 从 4 减少到 3
belief_nll_clip: 2.0
belief_warmup_t: 500000

name: "qmix_history_token_rnn_belief"

