# --- QMIX + token transformer belief + value representation supervision ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 2000
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner_token_belief"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "token_transformer_belief_mac"
agent: "token_transformer_belief"

transformer_hidden_dim: 48
transformer_heads: 4
transformer_layers: 2
transformer_dropout: 0.0

belief_loss_coef: 0.001
belief_logvar_min: -2.0
belief_logvar_max: 1.0
belief_lowrank_rank: 1
belief_nll_clip: 2.0
belief_warmup_t: 500000
belief_reappear_coef: 1.0

belief_repr_coef: 0.05
belief_teacher_q_coef: 0.1
belief_repr_warmup_t: 300000

name: "qmix_token_belief_value_repr"
