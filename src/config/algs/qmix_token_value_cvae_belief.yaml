# --- QMIX + token-history CVAE belief + value-aware distillation ---

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"
buffer_size: 2000
target_update_interval: 200

agent_output_type: "q"
learner: "q_learner_token_value_cvae_belief"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

mac: "token_value_cvae_belief_mac"
agent: "token_value_cvae_belief"

transformer_hidden_dim: 48
transformer_heads: 4
transformer_layers: 2
transformer_dropout: 0.0

belief_prior_type: "conditional"
belief_latent_dim: 16
belief_loss_coef: 0.01
belief_posterior_coef: 0.25
belief_kl_coef: 0.1
belief_logvar_min: -3.0
belief_logvar_max: 1.0
belief_nll_clip: 2.0
belief_confidence_center: -2.2
belief_confidence_temp: 1.5
belief_warmup_t: 300000
belief_kl_warmup_t: 300000
belief_pretrain_t: 50000
belief_pretrain_only: False
disable_belief: False
use_belief_for_q: True

belief_repr_coef: 0.02
belief_aux_delta_q_coef: 0.03
belief_distill_importance_min: 0.25
belief_distill_importance_max: 2.0
belief_value_warmup_t: 600000

record_belief_summary: False

name: "qmix_token_value_cvae_belief"

